global:
  # How long to wait before re-sending a resolved alert notification
  resolve_timeout: 5m

  # Optional: fill in SMTP settings from your .env to enable email alerts
  # smtp_smarthost: "${SMTP_HOST}"
  # smtp_from: "${SMTP_FROM}"
  # smtp_auth_username: "${SMTP_USERNAME}"
  # smtp_auth_password: "${SMTP_PASSWORD}"

# ─── Templates ───────────────────────────────────────────────────────────────
# templates:
#   - /etc/alertmanager/templates/*.tmpl

# ─── Routing tree ────────────────────────────────────────────────────────────
# Alerts flow down this tree. The first matching route wins.
route:
  # Default receiver if no child route matches
  receiver: "null"

  # Group alerts by name + severity so related alerts arrive together
  group_by: ["alertname", "severity"]

  # Wait this long to collect alerts into a single group notification
  group_wait: 30s

  # Wait this long before sending a follow-up notification for the same group
  group_interval: 5m

  # Repeat a firing alert notification after this long with no resolution
  repeat_interval: 4h

  routes:
    # Critical alerts get their own route — faster repeat, separate receiver
    - match:
        severity: critical
      receiver: "critical-alerts"
      group_wait: 10s
      repeat_interval: 1h
      continue: false

    # Warning alerts go to the default receiver
    - match:
        severity: warning
      receiver: "null"
      repeat_interval: 4h

# ─── Inhibition rules ────────────────────────────────────────────────────────
# Suppress warning-level alerts when a critical alert fires for the same instance.
# This prevents alert storms — if the host is down, don't also fire 10 "high CPU" alerts.
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["instance"]

# ─── Receivers ───────────────────────────────────────────────────────────────
receivers:

  # Null receiver: alerts are recorded but no notification is sent.
  # Useful while setting up — replace with a real receiver when ready.
  - name: "null"

  # Critical receiver: uncomment and configure one of the options below.
  - name: "critical-alerts"
    # ── Option A: Slack ──────────────────────────────────────────────────────
    # slack_configs:
    #   - api_url: "${SLACK_WEBHOOK_URL}"
    #     channel: "#alerts"
    #     title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
    #     text: >-
    #       {{ range .Alerts }}
    #         *Alert:* {{ .Annotations.summary }}
    #         *Details:* {{ .Annotations.description }}
    #       {{ end }}
    #     send_resolved: true

    # ── Option B: Email ──────────────────────────────────────────────────────
    # email_configs:
    #   - to: "${SMTP_TO}"
    #     send_resolved: true
    #     headers:
    #       Subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'

    # Placeholder — remove this when you configure a real receiver above
    webhook_configs: []
